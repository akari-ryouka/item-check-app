<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; width: 400px; padding: 15px; background: #f9f9f9; }
    h2 { font-size: 16px; margin-top: 0; color: #333; border-bottom: 2px solid #0075c2; padding-bottom: 5px; }
    .group { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
    .checkbox-label { display: flex; align-items: center; font-size: 13px; font-weight: normal; cursor: pointer; color: #333; margin-bottom: 10px;}
    .checkbox-label input { margin-right: 8px; width: auto; }
    input[type="text"], textarea, select { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 3px; margin-bottom: 8px; }
    .flex { display: flex; gap: 10px; }
    .flex > div { flex: 1; }
    button { width: 100%; padding: 10px; background: #0075c2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #005a96; }
    #status { margin-top: 10px; font-size: 12px; color: green; text-align: center; font-weight: bold; min-height: 15px; }
  </style>
</head>
<body>
  <h2>スカウト設定（新仕様）</h2>
  
  <div class="group">
    <label>① タイトル</label>
    <input type="text" id="subject" placeholder="タイトルを入力">
  </div>

  <div class="group">
    <label class="checkbox-label">
      <input type="checkbox" id="insert_name"> ② 学生の名前をさしこみ表示する
    </label>
  </div>

  <div class="group">
    <label>③ 選考特徴アイコン</label>
    <select id="feature_icon">
      <option value="">（選択しない）</option>
      <option value="つけない">つけない</option>
      <option value="面接確約">面接確約</option>
      <option value="全額交通費支給">全額交通費支給</option>
      <option value="日程調整可">日程調整可</option>
      <option value="一次選考免除">一次選考免除</option>
      <option value="オンライン先輩訪問">オンライン先輩訪問</option>
      <option value="職種限定コースあり">職種限定コースあり</option>
    </select>
  </div>

  <div class="group">
    <label>④ ホームページリンク</label>
    <select id="hp_link_flag">
      <option value="">（選択しない）</option>
      <option value="希望する">希望する</option>
      <option value="希望しない">希望しない</option>
    </select>
  </div>

  <div class="group">
    <div class="flex">
      <div><label>⑤ HP1 タイトル</label><input type="text" id="hp_name_1"></div>
      <div><label>⑤ HP1 URL</label><input type="text" id="hp_url_1"></div>
    </div>
    <div class="flex">
      <div><label>⑥ HP2 タイトル</label><input type="text" id="hp_name_2"></div>
      <div><label>⑥ HP2 URL</label><input type="text" id="hp_url_2"></div>
    </div>
    <div class="flex">
      <div><label>⑦ HP3 タイトル</label><input type="text" id="hp_name_3"></div>
      <div><label>⑦ HP3 URL</label><input type="text" id="hp_url_3"></div>
    </div>
  </div>

  <button id="saveBtn">設定を保存</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
